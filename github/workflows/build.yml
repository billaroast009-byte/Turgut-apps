name: Build Turgut APK on: push: branches: [ main ] workflow_dispatch: jobs: build: runs-on: ubuntu-latest steps: - uses: actions/checkout@v4 - uses: actions/setup-java@v4 with: java-version: '17' distribution: 'temurin' cache: gradle - uses: gradle/actions/setup-gradle@v3 with: gradle-version: '8.4' - run: chmod +x gradlew - run: gradle assembleDebug - run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Turgut.apk - uses: actions/upload-artifact@v4 with: name: Turgut-APK path: app/build/outputs/apk/debug/Turgut.apk retention-days: 30
